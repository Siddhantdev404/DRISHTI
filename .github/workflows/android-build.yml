name: Android Release Build Gate

on:
  pull_request:
    branches: [ main ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease
        
      - name: Verify APK Size Constraint
        run: |
          apk_size=$(unzip -l android/app/build/outputs/apk/release/app-release.apk | awk '{s+=$1} END {print s}')
          if [ "$apk_size" -gt 20971520 ]; then
            echo "FAIL: APK Size $apk_size exceeds 20MB limit."
            exit 1
          fi
          echo "PASS: APK Size $apk_size is under 20MB limit."
